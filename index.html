<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>アルバム</title>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: #05060f;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    color: #f3eee0;
    overflow-x: hidden;
  }

  /* ======= 夜空キャンバス ======= */
  #sky {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: linear-gradient(180deg, #050714 0%, #0a0d24 50%, #11132f 100%);
    overflow: hidden;
  }

  /* 星 */
  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle var(--dur) infinite ease-in-out var(--delay);
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.15; }
    50% { opacity: 1; }
  }

  /* ===== 背景の流れ星（斜め上 → 下） ===== */
  .shooting-star {
    position: absolute;
    width: var(--len);
    height: 2px;
    background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,1) 100%);
    border-radius: 2px;
    transform-origin: left center;
    transform: rotate(45deg);
    animation: bg-shoot var(--sdur) linear var(--sdelay) infinite;
    opacity: 0;
  }

  @keyframes bg-shoot {
    0% {
      opacity: 0;
      transform: translate(-20vw, -40vh) rotate(45deg);
    }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% {
      opacity: 0;
      transform: translate(120vw, 120vh) rotate(45deg);
    }
  }

  /* ======= アルバム本体 ======= */
  #album {
    position: relative;
    z-index: 1;
    padding: 40px 0 120px;
  }

  .photo-row {
    position: relative;
    height: 260px;
    margin-bottom: 20px;
    overflow: hidden;
  }

  /* ======= 流れ星カード（画像） ======= */
  .photo-card {
    position: absolute;
    cursor: pointer;
    filter: drop-shadow(0 0 18px rgba(140,150,255,0.3));
    transition: filter 0.2s;
    animation: drift-diagonal var(--drift-dur) linear var(--drift-delay) infinite;
  }

  @keyframes drift-diagonal {
    0% {
      transform: translate(-20vw, -40vh) rotate(var(--angle));
      opacity: 0;
    }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% {
      transform: translate(120vw, 120vh) rotate(var(--angle));
      opacity: 0;
    }
  }

  /* 流れ星の尾 */
  .photo-card::before {
    content: '';
    position: absolute;
    top: 50%;
    width: 120px;
    height: 2px;
    background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(200,210,255,0.5) 100%);
    transform: translateY(-50%);
    border-radius: 1px;
    left: -130px;
  }

  /* ======= 画像形状 ======= */
  .shape-round img {
    border-radius: 50%;
  }

  .shape-star img {
    clip-path: polygon(
      50% 0%, 61% 35%, 98% 35%, 
      68% 57%, 79% 91%, 50% 70%, 
      21% 91%, 32% 57%, 2% 35%, 
      39% 35%
    );
  }

  .shape-hex img {
    clip-path: polygon(
      25% 0%, 75% 0%, 
      100% 50%, 75% 100%, 
      25% 100%, 0% 50%
    );
  }

  .photo-card img {
    display: block;
    border: 1px solid rgba(255,255,255,0.1);
    object-fit: cover;
    pointer-events: none;
    user-select: none;
  }

  .photo-meta {
    text-align: center;
    margin-top: 6px;
    font-size: 0.72rem;
    color: #b0aad8;
    letter-spacing: 0.04em;
  }

  /* ======= ライトボックス ======= */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(2, 3, 14, 0.92);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    padding: 20px;
  }
  #lightbox.open {
    display: flex;
  }
  #lightbox img {
    max-width: 100%;
    max-height: 75vh;
    border-radius: 12px;
    box-shadow: 0 0 60px rgba(150,160,255,0.35);
    border: 1px solid rgba(255,255,255,0.12);
  }
  #lightbox-meta {
    font-size: 0.9rem;
    color: #cfc9ef;
    text-align: center;
  }
  #lightbox-close {
    position: fixed;
    top: 18px;
    right: 20px;
    font-size: 2rem;
    color: #ccc;
    cursor: pointer;
    background: none;
    border: none;
    padding: 4px 8px;
  }

  #empty-msg {
    text-align: center;
    color: #6b66a0;
    padding: 80px 20px;
    font-size: 0.9rem;
  }
</style>
</head>
<body>

<div id="sky"></div>
<div id="album"></div>

<!-- ライトボックス -->
<div id="lightbox" role="dialog" aria-modal="true">
  <button id="lightbox-close" aria-label="閉じる">×</button>
  <img id="lightbox-img" src="" alt="" />
  <div id="lightbox-meta"></div>
</div>

<script>
  /* ===== 夜空: 星 ===== */
  const sky = document.getElementById('sky');
  for (let i = 0; i < 140; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 0.8;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      --dur:${(Math.random()*3+2).toFixed(1)}s;
      --delay:-${(Math.random()*4).toFixed(1)}s;
    `;
    sky.appendChild(s);
  }

  /* ===== 背景流れ星（斜め上 → 下） ===== */
  for (let i = 0; i < 8; i++) {
    const ss = document.createElement('div');
    ss.className = 'shooting-star';
    const len = Math.random() * 120 + 80;

    ss.style.cssText = `
      --len:${len}px;
      --sdur:${(Math.random()*3+2).toFixed(1)}s;
      --sdelay:${(Math.random()*10).toFixed(1)}s;
      top:${Math.random()*10 - 20}vh;   /* -20〜-10vh（画面上の外側） */
      left:${Math.random()*40}vw;
    `;

    sky.appendChild(ss);
  }

  /* ===== 日付フォーマット ===== */
  function formatDate(d) {
    const s = String(d);
    if (s.length !== 8) return s;
    return `${s.slice(0,4)}年${s.slice(4,6)}月${s.slice(6,8)}日`;
  }

  /* ===== ライトボックス ===== */
  const lightbox = document.getElementById('lightbox');
  const lbImg = document.getElementById('lightbox-img');
  const lbMeta = document.getElementById('lightbox-meta');
  const lbClose = document.getElementById('lightbox-close');

  function openLightbox(src, alt, date, caption) {
    lbImg.src = src;
    lbImg.alt = alt;
    lbMeta.textContent = [formatDate(date), caption].filter(Boolean).join('　');
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeLightbox() {
    lightbox.classList.remove('open');
    lbImg.src = '';
    document.body.style.overflow = '';
  }

  lbClose.addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

  /* ===== 写真読み込み・描画 ===== */
  fetch('photos.json')
    .then(r => r.json())
    .then(photos => {
      const album = document.getElementById('album');

      if (!photos || photos.length === 0) {
        album.innerHTML = '<div id="empty-msg">まだ写真がありません</div>';
        return;
      }

      photos.sort((a, b) => String(b.date).localeCompare(String(a.date)));

      /* ===== 1行に 2〜3 枚のカードを流す ===== */
      for (let i = 0; i < photos.length; i += 3) {
        const row = document.createElement('div');
        row.className = 'photo-row';

        const group = photos.slice(i, i + 3);

        group.forEach(photo => {
          const card = document.createElement('div');

          /* ランダム形状 */
          const shapes = ['shape-round', 'shape-star', 'shape-hex'];
          const shape = shapes[Math.floor(Math.random() * shapes.length)];

          /* ランダム速度（10〜32秒） */
          const dur = Math.random() * 22 + 10;

          /* ランダム遅延（同時に流れる） */
          const delay = -(Math.random() * dur);

          /* ランダム角度（-45〜45度） */
          const angle = (Math.random() * 90 - 45).toFixed(1) + 'deg';

          /* ランダムサイズ（150〜320px） */
          const size = Math.random() * 170 + 150;

          card.className = `photo-card ${shape}`;
          card.style.cssText = `
            --drift-dur:${dur}s;
            --drift-delay:${delay}s;
            --angle:${angle};
          `;

          const img = document.createElement('img');
          img.src = 'images/' + photo.file;
          img.alt = photo.caption || '';
          img.loading = 'lazy';
          img.style.maxWidth = size + 'px';
          img.style.maxHeight = size + 'px';

          const meta = document.createElement('div');
          meta.className = 'photo-meta';
          meta.textContent = formatDate(photo.date) + (photo.caption ? '　' + photo.caption : '');

          card.appendChild(img);
          card.appendChild(meta);

          card.addEventListener('click', () => {
            openLightbox('images/' + photo.file, photo.caption || '', photo.date, photo.caption);
          });

          row.appendChild(card);
        });

        album.appendChild(row);
      }
    })
    .catch(() => {
      document.getElementById('album').innerHTML =
        '<div id="empty-msg">photos.json の読み込みに失敗しました</div>';
    });
</script>

</body>
</html>
